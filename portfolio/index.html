<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivam — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flubber@0.3.0/build/flubber.min.js"></script>
<style>
  :root {
    --paper: #FAFAF7;
    --ink: #111111;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;
  }
  body.locked { overflow: hidden; height: 100vh; }

  /* grid backdrop */
  .grid-lines {
    position: fixed; inset: 0;
    display: flex; justify-content: space-between;
    padding: 0 4vw;
    pointer-events: none; z-index: 1;
  }
  .grid-lines span { width: 1px; height: 100%; background: rgba(17,17,17,0.04); }

  /* nav */
  #navbar {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
  }
  .nav-links {
    display: flex;
    gap: 40px;
    background: #ffffff;
    padding: 12px 32px;
    border-radius: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .nav-links a {
    color: var(--ink);
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .nav-links a:hover {
    opacity: 0.5;
  }

  /* hero pin section */
  #heroPin {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    z-index: 10;
  }
  #nameWrap {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    position: absolute;
    top: 0; left: 0;
  }
  .hero-text {
    font-family: 'Anton', sans-serif;
    font-size: clamp(80px, 18vw, 320px);
    line-height: 1;
    text-transform: uppercase;
    display: flex;
    will-change: transform;
  }
  #heroTextLeft { transform-origin: left center; position: relative; }
  #heroTextRight { transform-origin: right center; position: relative; }
  
  .text-replacement {
    position: absolute;
    top: 0;
    opacity: 0;
    white-space: nowrap;
    text-transform: lowercase;
  }
  #heroTextLeft .text-replacement { left: 0; }
  #heroTextRight .text-replacement { right: 0; }

  .char {
    display: inline-block;
  }

  #mediaGap {
    width: 0;
    height: 55vh;
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    flex-shrink: 0;
  }
  #mediaGap .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    overflow: hidden;
  }
  #mediaGap .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.2);
  }
  
  #finalGap {
    width: 0;
    flex-shrink: 0;
  }

  #introLines {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -40%);
    text-align: center;
    opacity: 0;
    width: 90%;
    max-width: 900px;
    z-index: 5;
  }
  #introLines h1 {
    font-weight: 500;
    font-size: clamp(28px, 4vw, 56px);
    margin-bottom: 16px;
    letter-spacing: -1px;
  }
  #introLines h2 {
    font-weight: 400;
    font-size: clamp(20px, 3vw, 42px);
    line-height: 1.3;
    color: rgba(17, 17, 17, 0.8);
    letter-spacing: -0.5px;
  }

  /* scroll indicator */
  .scroll-indicator {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
  }
  .scroll-indicator .arrow {
    width: 1px;
    height: 24px;
    background: var(--ink);
    position: relative;
    overflow: hidden;
  }
  .scroll-indicator .arrow::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--paper);
    animation: scrollDown 1.5s infinite cubic-bezier(0.65, 0, 0.35, 1);
  }
  @keyframes scrollDown {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  .next-section {
    position: relative;
    z-index: 5;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    background: var(--ink);
    color: var(--paper);
  }
</style>
</head>
<body class="locked">

<div class="grid-lines">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<nav id="navbar">
  <div class="nav-links">
    <a href="#">Work</a>
    <a href="#">Play</a>
    <a href="#">About</a>
  </div>
</nav>

<section id="heroPin">
  <div id="nameWrap">
    <div id="heroTextLeft" class="hero-text">
      <div class="text-original">
        <svg class="morph-svg" id="svg-left" viewBox="0 -100 160 120" style="height: 1em; width: auto; overflow: visible; display: block; fill: currentColor;">
          <path class="stick char-1" d="M 0,-100 L 25,-100 L 25,0 L 0,0 Z" />
          <path class="stick char-2" d="M 50,-100 L 75,-100 L 75,0 L 50,0 Z" />
          <path class="stick char-3" d="M 100,-100 L 125,-100 L 125,0 L 100,0 Z" />
        </svg>
      </div>
      <div class="text-replacement">svxm</div>
    </div>
    
    <div id="mediaGap">
      <div class="slide slide-1"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop" alt="Project 1"></div>
      <div class="slide slide-2"><img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2000&auto=format&fit=crop" alt="Project 2"></div>
      <div class="slide slide-3"><img src="https://images.unsplash.com/photo-1558655146-d09347e92766?q=80&w=2000&auto=format&fit=crop" alt="Project 3"></div>
      <div class="slide slide-4"><img src="https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=2000&auto=format&fit=crop" alt="Project 4"></div>
    </div>
    
    <div id="finalGap"></div>
    
    <div id="heroTextRight" class="hero-text">
      <div class="text-original">
        <svg class="morph-svg" id="svg-right" viewBox="0 -100 200 120" style="height: 1em; width: auto; overflow: visible; display: block; fill: currentColor;">
          <path class="stick char-4" d="M 0,-100 L 25,-100 L 25,0 L 0,0 Z" />
          <path class="stick char-5" d="M 70,-100 L 95,-100 L 95,0 L 70,0 Z" />
          <path class="stick char-6" d="M 140,-100 L 165,-100 L 165,0 L 140,0 Z" />
        </svg>
      </div>
      <div class="text-replacement">dev</div>
    </div>
  </div>

  <div id="introLines">
    <h1>Hi, I am Shivam!</h1>
    <h2>I revel in the fusion of design and code,<br>helping brands define how they should move.</h2>
  </div>

  <div class="scroll-indicator" id="scrollInd">
    <div class="arrow"></div>
    <span>Scroll</span>
  </div>
</section>

<section class="next-section">
  Rest of the page continues here ↓
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

// Initial entrance morph animation
opentype.load('https://raw.githubusercontent.com/google/fonts/main/ofl/anton/Anton-Regular.ttf', function(err, font) {
  if (err) {
    console.error('Font could not be loaded: ' + err);
    document.body.classList.remove('locked');
    initScrollSequence();
    return;
  }

  const fontSize = 100;

  // Generate paths for each character
  function getWordPaths(word) {
    const paths = [];
    let currentX = 0;
    for (let i = 0; i < word.length; i++) {
      const char = word[i];
      const glyph = font.charToGlyph(char);
      const path = glyph.getPath(currentX, 0, fontSize);
      paths.push(path.toPathData(2));
      currentX += (glyph.advanceWidth * fontSize) / font.unitsPerEm;
    }
    return paths;
  }

  const allTargetPaths = [
    ...getWordPaths("SHI"),
    ...getWordPaths("VAM")
  ];

  const morphTl = gsap.timeline({
    onComplete: () => {
      document.body.classList.remove('locked');
      gsap.to('#scrollInd', {opacity: 1, duration: 0.5});
      initScrollSequence();
    }
  });

  // Staggered morph animation using Flubber
  for (let i = 1; i <= 6; i++) {
    const stick = document.querySelector('.char-' + i);
    const startPath = stick.getAttribute('d');
    const endPath = allTargetPaths[i - 1];
    
    // Create an interpolator with flubber for smooth shape tweening
    const interpolator = flubber.interpolate(startPath, endPath, { maxSegmentLength: 2 });
    
    const dummy = { progress: 0 };
    morphTl.to(dummy, {
      progress: 1,
      duration: 1.4,
      ease: "elastic.out(1, 0.4)",
      onUpdate: function() {
        stick.setAttribute('d', interpolator(this.targets()[0].progress));
      }
    }, (i - 1) * 0.1);
  }
});

function initScrollSequence() {
  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: "#heroPin",
      start: "top top",
      end: "+=4000",
      scrub: 1,
      pin: true,
      invalidateOnRefresh: true
    }
  });

  // Step 1: Open media gap and fade out scroll indicator
  tl.to("#scrollInd", {opacity: 0, duration: 0.05}, 0);
  tl.to("#mediaGap", {width: () => window.innerWidth * 0.45, ease: "power2.inOut", duration: 0.15}, 0);

  // Step 2: Cycle through slides with slight image scale animation
  const slideDuration = 0.1;
  const slideOverlap = 0.02;
  let startTime = 0.15;

  // Slide 1
  tl.to(".slide-1", {opacity: 1, duration: 0.05}, startTime)
    .to(".slide-1 img", {scale: 1, duration: slideDuration, ease: "none"}, startTime)
    .to(".slide-1", {opacity: 0, duration: 0.05}, startTime + slideDuration - slideOverlap);
  
  startTime += slideDuration;

  // Slide 2
  tl.to(".slide-2", {opacity: 1, duration: 0.05}, startTime)
    .to(".slide-2 img", {scale: 1, duration: slideDuration, ease: "none"}, startTime)
    .to(".slide-2", {opacity: 0, duration: 0.05}, startTime + slideDuration - slideOverlap);

  startTime += slideDuration;

  // Slide 3
  tl.to(".slide-3", {opacity: 1, duration: 0.05}, startTime)
    .to(".slide-3 img", {scale: 1, duration: slideDuration, ease: "none"}, startTime)
    .to(".slide-3", {opacity: 0, duration: 0.05}, startTime + slideDuration - slideOverlap);

  startTime += slideDuration;

  // Slide 4
  tl.to(".slide-4", {opacity: 1, duration: 0.05}, startTime)
    .to(".slide-4 img", {scale: 1, duration: slideDuration, ease: "none"}, startTime)
    .to(".slide-4", {opacity: 0, duration: 0.05}, startTime + slideDuration); // no overlap for last

  startTime += slideDuration;

  // Step 3: Close media gap
  tl.to("#mediaGap", {width: 0, ease: "power2.inOut", duration: 0.1}, startTime);

  startTime += 0.1;

  // Step 4: Expand final gap, scale down texts, move them up, show intro & nav
  
  // Calculate exact gap needed to push text to the 4vw padding edges
  const getFinalGapWidth = () => {
    const leftW = document.getElementById('heroTextLeft').offsetWidth;
    const rightW = document.getElementById('heroTextRight').offsetWidth;
    const padding = window.innerWidth * 0.08; // 4vw on each side = 8vw total
    return window.innerWidth - leftW - rightW - padding;
  };

  // Target Y position to perfectly align with the navbar
  // Navbar is at top: 32px with roughly 40px height. Center is ~52px.
  const getTargetY = () => {
    return 52 - window.innerHeight / 2;
  };

  tl.to("#finalGap", {width: getFinalGapWidth, ease: "power2.inOut", duration: 0.15}, startTime)
    .to("#heroTextLeft", {scale: 0.22, ease: "power2.inOut", duration: 0.15}, startTime)
    .to("#heroTextRight", {scale: 0.22, ease: "power2.inOut", duration: 0.15}, startTime)
    .to("#nameWrap", {y: getTargetY, ease: "power2.inOut", duration: 0.15}, startTime)
    
    // Crossfade the text seamlessly during the scale transition
    .to(".text-original", {opacity: 0, ease: "power2.inOut", duration: 0.15}, startTime)
    .to(".text-replacement", {opacity: 1, ease: "power2.inOut", duration: 0.15}, startTime)
    
    .to("#introLines", {opacity: 1, y: "0", ease: "power2.out", duration: 0.1}, startTime + 0.05)
    .to("#navbar", {opacity: 1, pointerEvents: "auto", ease: "power2.out", duration: 0.1}, startTime + 0.05);
}
</script>
</body>
</html>
